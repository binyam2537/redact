<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a1a;
      --bg-elevated: #262626;
      --bg-input: #2a2a2a;
      --text: #e5e5e5;
      --text-secondary: #a3a3a3;
      --border: #333;
      --danger: #ef4444;
      --success: #22c55e;
      --accent: #3b82f6;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --bg-elevated: #f5f5f5;
        --bg-input: #fafafa;
        --text: #171717;
        --text-secondary: #737373;
        --border: #e5e5e5;
      }
    }

    body {
      width: 400px;
      min-height: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    /* ── Toolbar ── */

    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
    }

    .toolbar-spacer { flex: 1; }

    .btn-icon {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .btn-icon:hover {
      color: var(--text);
      background: var(--bg-elevated);
    }

    .btn-icon.active {
      color: var(--accent);
    }

    /* ── Editor area (unified — textarea when editing, div when previewing) ── */

    .editor-wrap {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .editor-wrap:focus-within {
      border-color: var(--accent);
    }

    .editor-wrap.safe {
      border-color: var(--success);
    }

    .editor-wrap.unsafe {
      border-color: var(--danger);
    }

    #input-area {
      width: 100%;
      min-height: 140px;
      max-height: 300px;
      background: var(--bg-input);
      color: var(--text);
      border: none;
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }

    #preview-area {
      display: none;
      width: 100%;
      min-height: 140px;
      max-height: 300px;
      overflow-y: auto;
      background: var(--bg-input);
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Action buttons ── */

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-analyze {
      background: var(--accent);
      color: #fff;
    }

    .btn-redact {
      background: var(--danger);
      color: #fff;
      display: none;
    }

    /* ── Findings summary ── */

    #findings-summary {
      margin-top: 10px;
      display: none;
      font-size: 12px;
      line-height: 1.6;
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .finding-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin: 1px;
      font-weight: 500;
    }

    .sev-1 { background: rgba(234, 179, 8, 0.12); color: #ca8a04; }
    .sev-2 { background: rgba(249, 115, 22, 0.12); color: #ea580c; }
    .sev-3 { background: rgba(239, 68, 68, 0.12); color: #dc2626; }

    @media (prefers-color-scheme: dark) {
      .sev-1 { color: #facc15; }
      .sev-2 { color: #fb923c; }
      .sev-3 { color: #f87171; }
    }

    .safe-badge {
      color: var(--success);
      margin-top: 10px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    /* ── PII Highlights ── */

    mark.pps-highlight {
      padding: 1px 3px;
      border-radius: 3px;
      cursor: help;
    }

    mark.pps-severity-1 { background: rgba(234, 179, 8, 0.18); color: #a16207; }
    mark.pps-severity-2 { background: rgba(249, 115, 22, 0.18); color: #c2410c; }
    mark.pps-severity-3 { background: rgba(239, 68, 68, 0.18); color: #b91c1c; }

    @media (prefers-color-scheme: dark) {
      mark.pps-severity-1 { color: #facc15; }
      mark.pps-severity-2 { color: #fb923c; }
      mark.pps-severity-3 { color: #f87171; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button class="btn-icon" id="toggle-mode" title="Toggle edit / preview">
      <!-- Lucide eye icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <div class="toolbar-spacer"></div>
    <button class="btn-icon" id="toggle-theme" title="Toggle light/dark mode">
      <!-- Lucide sun icon (shown in dark mode) -->
      <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      <!-- Lucide moon icon (shown in light mode) -->
      <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>
  </div>

  <div class="editor-wrap" id="editor-wrap">
    <textarea id="input-area" placeholder="Paste text to analyze for sensitive data..."></textarea>
    <div id="preview-area"></div>
  </div>

  <div class="actions">
    <button class="btn btn-analyze" id="analyze-btn">
      <!-- Lucide search icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      Analyze
    </button>
    <button class="btn btn-redact" id="redact-btn">
      <!-- Lucide eraser icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
      Redact All
    </button>
  </div>

  <div class="safe-badge" id="safe-badge">
    <!-- Lucide shield-check icon -->
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
    No sensitive data detected.
  </div>
  <div id="findings-summary"></div>

  <script src="detector.js"></script>
  <script src="popup.js"></script>
</body>
</html>
